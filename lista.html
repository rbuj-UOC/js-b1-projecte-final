<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Lista - Lista de la Compra</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg glass mb-4 px-4 py-3 d-print-none border-0">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="#">Mercado en línea</a>
      <div class="d-flex align-items-center gap-3">
        <a href="productos.html" class="btn btn-sm btn-outline-secondary fw-bold">Volver a Productos</a>
      </div>
    </div>
  </nav>

  <div class="container flex-grow-1">
    <div class="glass p-4 p-md-5 w-100 mx-auto" style="max-width: 800px;">
      <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center mb-4 gap-3">
        <h2 id="lista-title" class="mb-0 fw-bold">Detalle de la Lista</h2>
        <button onclick="window.print()" class="btn btn-primary fw-bold d-print-none">Imprimir Lista</button>
      </div>

      <p id="lista-date" class="mb-4 fw-medium text-secondary"></p>

      <div class="table-responsive">
        <table class="table table-hover align-middle shadow-sm rounded overflow-hidden">
          <thead class="table-light">
            <tr>
              <th class="fw-bold">Producto</th>
              <th class="fw-bold text-end pe-4 ">Cantidad</th>
            </tr>
          </thead>
          <tbody id="lista-body" class="bg-white">
            <!-- Filas generadas por JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/lista.js"></script>
</body>

</html>
