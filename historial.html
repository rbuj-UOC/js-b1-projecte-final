<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial - Lista de la Compra</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100 border-0">
  <nav class="navbar navbar-expand-lg glass mb-4 px-4 py-3">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="#">Mercado en línea</a>
      <div class="d-flex align-items-center gap-3">
        <a href="productos.html" class="btn btn-sm btn-outline-secondary fw-bold">Volver a Productos</a>
      </div>
    </div>
  </nav>

  <div class="container flex-grow-1">
    <div class="glass p-4 p-md-5 w-100 mx-auto" style="max-width: 900px;">
      <h2 class="mb-4 fw-bold text-center">Tus listas guardadas</h2>

      <div class="table-responsive">
        <table class="table table-hover align-middle shadow-sm rounded overflow-hidden text-center">
          <thead class="table-light">
            <tr>
              <th class="fw-bold">Fecha y Hora</th>
              <th class="fw-bold">Total Productos Diferentes</th>
              <th class="fw-bold">Acción</th>
            </tr>
          </thead>
          <tbody id="historial-body" class="bg-white">
            <!-- Generado por JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/historial.js"></script>
</body>

</html>
