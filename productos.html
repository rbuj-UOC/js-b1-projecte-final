<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - Lista de la Compra</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg glass mb-4 px-4 py-3 rounded-0">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="#">Mercado en línea</a>
      <div class="d-flex align-items-center gap-3">
        <span id="user-display" class="fw-medium text-dark"></span>
        <button id="btn-logout" class="btn btn-sm btn-outline-danger fw-bold">Salir</button>
      </div>
    </div>
  </nav>

  <div class="container flex-grow-1">
    <h2 class="text-center mb-4 fw-bold">Selecciona tus productos</h2>

    <div class="d-flex justify-content-center flex-wrap gap-2 mb-5" id="categories-container">
      <!-- Botones de categorías generados por JS -->
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 mb-5" id="products-container">
      <!-- Productos generados por JS -->
    </div>
  </div>

  <div class="action-toolbar glass d-flex justify-content-center gap-3 p-3 mt-auto rounded-0">
    <button id="btn-guardar" class="btn btn-success fw-bold px-4">Guardar Lista (<span
        id="items-count">0</span>)</button>
    <button id="btn-mostrar" class="btn btn-primary fw-bold px-4">Mostrar Actual</button>
    <button id="btn-listas" class="btn btn-outline-secondary fw-bold px-4">Historial de Listas</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/clases.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/productos.js"></script>
</body>

</html>
