<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Lista de la Compra</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">
  <div class="container d-flex flex-column justify-content-center align-items-center flex-grow-1 my-5">
    <div class="glass auth-form p-4 w-100" style="max-width: 450px;">
      <h2 class="text-center mb-4 fw-bold">Iniciar Sesión</h2>
      <form id="login-form">
        <div class="mb-3 form-group" id="group-usuario">
          <label for="usuario" class="form-label fw-medium text-secondary">Usuario</label>
          <input type="text" id="usuario" name="usuario" class="form-control" required>
          <div class="error-message">Introduce tu usuario</div>
        </div>
        <div class="mb-4 form-group" id="group-pass">
          <label for="contrasena" class="form-label fw-medium text-secondary">Contraseña</label>
          <input type="password" id="contrasena" name="contrasena" class="form-control" required>
          <div class="error-message">Introduce tu contraseña</div>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary fw-bold">Aceptar</button>
          <a href="registro.html" class="btn btn-outline-primary fw-bold">Nuevo usuario</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/clases.js"></script>
  <script src="js/datos.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
